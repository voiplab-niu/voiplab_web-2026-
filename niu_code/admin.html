<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>管理員後台</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 p-6">

  <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-lg p-6 space-y-6">
    <div class="flex justify-between items-center">
      <h1 class="text-2xl font-bold mb-4">
        🛠️ 管理員後台｜<span id="adminName" class="text-base font-medium text-blue-600"></span>
      </h1>
      <div class="space-x-2">
        <button onclick="editSelf()" class="text-sm text-blue-600 hover:underline">✏️ 編輯我的名片</button>
        <!--0725-->
        <button onclick="goRegisterPage()" class="text-sm text-green-600 hover:underline">➕ 新增帳號</button>
        <button onclick="logout()" class="text-sm text-red-500 hover:underline">登出</button>
      </div>
    </div>

    <table class="w-full border text-left">
      <thead class="bg-gray-200">
        <tr>
          <th class="py-2 px-4">ID</th>
          <th class="py-2 px-4">姓名</th>
          <th class="py-2 px-4">操作</th>
        </tr>
      </thead>
      <tbody id="userTable" class="divide-y divide-gray-300">
        <!-- 使用者資料會透過 JS 動態插入 -->
      </tbody>
    </table>
  </div>

  <script>
    const userId = localStorage.getItem("user_id");
    const role = parseInt(localStorage.getItem("role"));

    if (!userId || isNaN(role) || role < 1) {
      alert("❌ 您沒有權限進入管理員介面");
      window.location.href = "login.html";
    }

    const roleName = role === 2 ? "super_admin" : "editor_admin";
    document.getElementById("adminName").textContent = `目前登入：${userId}（${roleName}）`;

    async function loadUsers() {
  try {
    const res = await fetch("/api/user-list");
    const users = await res.json();
    const table = document.getElementById("userTable");
    table.innerHTML = "";

    users.forEach(user => {
      const isSuperAdmin = Number(user.role) === 2;

      const row = document.createElement("tr");
      row.className = "";

      let actionButtons = "";

      if (role === 2) {
        actionButtons += `
          <a href="niu_code.html?user=${user.id}" target="_blank"
            class="bg-blue-500 text-white px-3 py-1 rounded-lg hover:bg-blue-600">
            查看名片
          </a>
          <button onclick="editUser('${user.id}')"
            class="bg-yellow-500 text-white px-3 py-1 rounded-lg hover:bg-yellow-600">
            ✏️ 編輯
          </button>
          <button onclick="changePassword('${user.id}')"
            class="bg-purple-500 text-white px-3 py-1 rounded-lg hover:bg-purple-600">
            🔐 修改密碼
          </button>`;

        if (isSuperAdmin) {
          actionButtons += `<span class="bg-gray-400 text-white px-3 py-1 rounded-lg cursor-not-allowed">🔒 管理員</span>`;
        } else {
          actionButtons += `
            <button onclick="deleteUser('${user.id}')"
              class="bg-red-500 text-white px-3 py-1 rounded-lg hover:bg-red-600">
              🗑️ 刪除
            </button>`;
        }
      }

      row.innerHTML = `
        <td class="py-2 px-4">${user.id}</td>
        <td class="py-2 px-4">${user.name}</td>
        <td class="py-2 px-4 space-x-2">${actionButtons}</td>
      `;

      table.appendChild(row);
    });
  } catch (err) {
    console.error("❌ 載入使用者清單失敗：", err);
  }
}


    function editUser(userId) {
      localStorage.setItem('user_id', userId);
      window.location.href = 'editv2.html';
    }

    function editSelf() {
      window.location.href = 'editv2.html';
    }

    // 0725 新增：將新增帳號功能改成跳轉到 register.html
    function goRegisterPage() {
      window.location.href = 'register.html';
    }

    async function changePassword(userId) {
      const pw1 = prompt(`請輸入 ${userId} 的新密碼：`);
      if (!pw1) return;

      const pw2 = prompt(`請再次輸入密碼以確認：`);
      if (pw1 !== pw2) {
        alert("❌ 密碼不一致，請重新操作");
        return;
      }

      try {
        const res = await fetch("/api/change-password2", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ user_id: userId, new_password: pw1 })
        });

        const result = await res.json();
        if (res.ok && result.success) {
          alert("✅ 密碼已成功更新");
        } else {
          alert("❌ 密碼更新失敗：" + (result.error || "未知錯誤"));
        }
      } catch (err) {
        console.error("❌ 發生錯誤：", err);
        alert("⚠️ 無法更新密碼");
      }
    }

    async function deleteUser(userId) {
      if (!confirm(`確定要刪除 ID 為 ${userId} 的使用者嗎？`)) return;

      try {
        const res = await fetch(`/api/user/${userId}`, {
          method: "DELETE"
        });
        const result = await res.json();

        if (res.ok && result.success) {
          alert("✅ 已刪除！");
          loadUsers();
        } else {
          alert("❌ 刪除失敗：" + (result.error || "未知錯誤"));
        }
      } catch (err) {
        console.error("❌ 發生錯誤：", err);
        alert("⚠️ 無法刪除資料");
      }
    }

    function logout() {
      localStorage.removeItem("user_id");
      localStorage.removeItem("role");
      window.location.href = "login.html";
    }

    window.addEventListener("DOMContentLoaded", loadUsers);
  </script>
</body>
</html>
