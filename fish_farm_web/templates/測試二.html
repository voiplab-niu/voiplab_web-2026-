<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRcode</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #ddedf4;
            position: relative;
        }
        #qr-reader {
            width: 100vw;
            max-width: 800px;
            height: 100vh;
            position: absolute; /* 確保相機畫面正確顯示 */
        }
        .qr-box {
            position: relative;
            width: 70%;
            max-width: 350px;
            height: 70%;
            max-height: 350px;
            background: transparent;
            border: 2px solid white;
            z-index: 2;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
        #SQR {
            background-color: #4fc3f7; /* 淺藍色按鈕 */
            color: #ffffff; /* 按鈕文字顏色 */
            border: none;
            padding: 10px 5px;
            margin: 5px;
            width: 95%; /* 寬度 100% */
            height: 100%; /* 高度 100% */
            border-radius: 5px;
            cursor: pointer;
            font-size: 25px ; 
            text-align: left; /* 文字靠左 */

        }
        #SQR:hover {
        background-color: #0288d1; /* 滑鼠懸停時變深的藍色 */
        }
    </style>
</head>
<body>
    <div id="sideMenu">
        <button id="menuButton" onclick="toggleMenu()"></button>
        <a href="/" class="menu-item" id="homeLink">
            回到主頁 <img src="{{ url_for('static', filename='images/home.png') }}" alt="Home" class="menu-icon">
        </a>
        <div class="dropdown">    
            <a href="#" class="menu-item">
                <span class="menu-text">監控系統</span>
                <img src="{{ url_for('static', filename='images/view.png') }}" alt="" class="menu-icon">
            </a>
            <div class="dropdown-content">
                <a href="fish1.html">魚池一</a>
                <a href="fish2.html">魚池二</a>
                <a href="#">魚池三</a>
            </div>
        </div>
        <a href="#" class="menu-item">
            使用者介面 <img src="{{ url_for('static', filename='images/user.png') }}" alt="" class="menu-icon">
         </a>
        <div class="dropdown">
            <a href="#" class="menu-item">
                異常值設定<img src="{{ url_for('static', filename='images/warning.png') }}" alt="" class="menu-icon">
            </a>
            <div class="dropdown-content">
                <a href="alertSettings.html">文字輸入</a>
                <a href="line.html">拉桿輸入</a>
            </div>
        </div>
        <div id="buttonContainer">
            <button id ="SQR"onclick="startQRScanner()">掃描 QR Code</button>
        </div>
    </div>
    <div id="qr-reader">
        <div class="qr-box"></div>
    </div>

    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script>
        function getQRBoxSize() {
            return window.innerWidth < 600 ? 250 : 350;
        }

        function startQRScanner() {
            if (!confirm("是否允許開啟鏡頭進行 QR Code 掃描？")) {
                return;
            }
            let qrReader = document.getElementById("qr-reader");

            // 避免重複初始化
            if (document.querySelector("#qr-reader video")) {
                return;
            }

            let qrScanner = new Html5Qrcode("qr-reader");
            qrScanner.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: getQRBoxSize() || 250 },
                onScanSuccess
            ).catch(err => console.error("QR Scanner 啟動失敗", err));
        }

        function onScanSuccess(decodedText, decodedResult) {
            if (confirm(`現在要前往 ${decodedText} 嗎？`)) {
                window.location.href = decodedText;
            }
        }
        function toggleMenu() {
            const sideMenu = document.getElementById('sideMenu');
            // 判斷側邊菜單當前的顯示狀態，進行切換
            if (sideMenu.style.left === '0px') {
                sideMenu.style.left = '-250px'; // 隱藏菜單
            } else {
                sideMenu.style.left = '0px'; // 顯示菜單
            }
        }

        window.onload = startQRScanner;
    </script>
</body>
</html>
