<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>對話介面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #444343;
            color: #f4f4f4;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .chat-container {
            height: 100vh; /* 增大對話框高度 */
            width: 80%;
            margin: 0 auto;
            background-color: #444;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .chat-box {
            height: 10vh; /* 增大對話框高度 */
            overflow-y: auto;
            padding: 20px;
            background-color: #333;
            flex-grow: 1; /* 讓訊息區域填滿剩餘空間 */
            display: flex;
            flex-direction: column-reverse; /* 新訊息顯示在底部 */
        }

        .message {
            margin-bottom: 10px;
            padding: 12px;
            border-radius: 5px;
            max-width: 80%;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .bot-message {
            background-color: #555;
            margin-left: 0;
            align-self: flex-start; /* 讓機器人訊息顯示在左邊 */
        }

        .user-message {
            background-color: #0084ff;
            color: white;
            margin-right: 0;
            text-align: right;
            align-self: flex-end; /* 讓用戶訊息顯示在右邊 */
        }

        .input-box {
            width: 100%; /* 填滿父容器 */
            display: flex;
            padding: 10px;
            background-color: #222;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid #555;
            gap:10px;
        }

        .input-box input {
            flex: 5; /* 填滿剩餘空間 */
            padding: 10px; /* 內邊距讓輸入框更美觀 */
            font-size: 16px; /* 字體大小 */
            border: 1px solid #ccc; /* 邊框樣式 */
            border-radius: 5px; /* 圓角 */
        }

        .input-box button {
            flex: 1; /* 填滿剩餘空間 */

            padding: 10px 20px; /* 按鈕內邊距 */
            font-size: 16px; /* 字體大小 */
            border: none; /* 去除邊框 */
            border-radius: 5px; /* 圓角 */
            background-color: #007BFF; /* 背景色 */
            color: white; /* 按鈕文字顏色 */
            cursor: pointer; /* 鼠標樣式 */
            flex-shrink: 0; /* 防止按鈕縮小 */
        }

        .input-box button:hover {
            background-color: #0056b3; /* 懸停效果 */
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-box" id="chatBox">
            <div class="message bot-message">
                <p>您好！我是AI助手，請問有什麼可以幫忙的嗎？</p>
            </div>
        </div>
        <div class="input-box">
            <input type="text" id="userInput" placeholder="請輸入您的問題..." />
            <button id="sendBtn">送出</button>
        </div>
    </div>

    <script>
        document.getElementById("sendBtn").addEventListener("click", function() {
            let userInput = document.getElementById("userInput").value;
            if (userInput.trim()) {
                // 顯示用戶輸入的訊息
                addMessage(userInput, "user");
                document.getElementById("userInput").value = "";
                
                // 模擬AI回應
                setTimeout(() => {
                    let botResponse =  generateRandomString();;
                    addMessage(botResponse, "bot");
                }, 1000);
            }
        });

        function addMessage(message, sender) {
            let messageDiv = document.createElement("div");
            messageDiv.classList.add("message");
            messageDiv.classList.add(sender === "user" ? "user-message" : "bot-message");
            messageDiv.innerHTML = `<p>${message}</p>`;
            document.getElementById("chatBox").prepend(messageDiv);  // 使用prepend將新訊息插入最上面
        }
        function generateRandomString() {
            const characters = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+=-<>?";
            const length = Math.floor(Math.random() * 10) + 5; // 亂碼長度隨機在 5 到 15 之間
            let randomString = "";
            for (let i = 0; i < length; i++) {
                randomString += characters.charAt(Math.floor(Math.random() * characters.length));
            }
            return randomString;
        }
    </script>
</body>
</html>
