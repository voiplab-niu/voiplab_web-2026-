let activeNotification = null;

// 全局變數，用於追蹤所有警報狀態
const alertState = {
    blockedAlerts: new Set(),       // 已達上限的警報
    pendingRequests: new Set(),     // 正在處理的請求
    retryDelays: new Map(),         // 重試延遲時間
    maxRetries: 3,                  // 最大重試次數
    baseDelay: 1000                 // 基礎重試延遲(毫秒)
};

function checkAndNotifyLatestAbnormal() {
    // 如果已經有活躍的通知且未完成，不再發送新的
    if (activeNotification) {
        console.debug(`[通知系統] 已有活躍通知 ${activeNotification.key}，跳過檢查`);
        return;
    }
    
    // 取得最新一筆未處理事件
    const latestUnresolvedMap = new Map();

    for (const event of allAbnormalEvents) {
        // 跳過已阻止的警報
        if (alertState.blockedAlerts.has(event.web_id)) {
            continue;
        }
        
        if (event.status === '未處理') {
            const key = `${event.type}|${event.content}|${event.web_id}`;
            if (!latestUnresolvedMap.has(key)) {
                latestUnresolvedMap.set(key, event);
            } else {
                // 保留較新的
                const existing = latestUnresolvedMap.get(key);
                if (new Date(event.flip_time) > new Date(existing.flip_time)) {
                    latestUnresolvedMap.set(key, event);
                }
            }
        }
    }

    // 處理符合條件的事件
    latestUnresolvedMap.forEach(event => {
        const notifyKey = `${event.type}|${event.content}|${event.web_id}`;

        if (!activeNotification || activeNotification.key !== notifyKey) {
            console.debug(`[通知系統] 準備發送通知 "${event.type}/${event.content}"`);

            // 啟動通知流程
            startNotificationCycle(event, notifyKey);
        }
    });
}

function startNotificationCycle(event, notifyKey) {
    // 清除可能存在的舊定時器
    if (activeNotification) {
        clearInterval(activeNotification.interval);
    }

    // 發送第一次通知
    sendNotification(event);

    // 啟動定時器
    activeNotification = {
        key: notifyKey,
        alert_id: event.web_id,
        interval: setInterval(() => {
            const updated = allAbnormalEvents.find(e => e.web_id === event.web_id);
            if (!updated || updated.status !== '未處理' || alertState.blockedAlerts.has(event.web_id)) {
                console.debug(`[通知系統] 停止通知 "${event.type}/${event.content}"`);
                clearInterval(activeNotification.interval);
                activeNotification = null;
            } else {
                console.debug(`[通知系統] 定時檢查發送通知 "${event.type}/${event.content}"`);
                sendNotification(event);
            }
        }, 60000) // 每60秒檢查一次
    };
}
// 全局状态控制
const notificationLimiter = {
    maxAttempts: 3,  // 最大尝试次数
    attempts: new Map(), // 记录每个警报的尝试次数 {alertId: count}
    sentAlerts: new Set() // 已经完成通知的警报ID
};

function sendNotification(event) {
    // 1. 检查是否已经完成通知
    if (notificationLimiter.sentAlerts.has(event.web_id)) {
        console.debug(`[通知] ${event.web_id} 已完成通知流程`);
        return;
    }

    // 2. 获取当前尝试次数
    const attemptCount = notificationLimiter.attempts.get(event.web_id) || 0;
    
    // 3. 超过最大尝试次数
    if (attemptCount >= notificationLimiter.maxAttempts) {
        console.warn(`[通知] ${event.web_id} 已达到最大尝试次数`);
        notificationLimiter.sentAlerts.add(event.web_id);
        return;
    }

    // 4. 发送通知
    notificationLimiter.attempts.set(event.web_id, attemptCount + 1);
    
    fetch('/fish_farm/send_notify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            alertType: event.type,
            message: event.content,
            alertId: event.web_id,
            attempt: attemptCount + 1  // 告知后端当前是第几次尝试
        })
    })
    .then(response => {
        if (!response.ok) throw new Error('HTTP error');
        return response.json();
    })
    .then(data => {
        if (data.success) {
            
            notificationLimiter.sentAlerts.add(event.web_id); // 标记为已完成
        }
    })
    .catch(error => {
        console.warn(`[通知] 第${attemptCount + 1}次嘗試失敗: ${error.message}`);
        if (attemptCount + 1 >= notificationLimiter.maxAttempts) {
            notificationLimiter.sentAlerts.add(event.web_id);
        }
    });
}

function formatTime(timeString) {
    const date = new Date(timeString); // 將 ISO 字符串轉換為 Date 物件
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0'); // 月份是 0-11，需要加 1
    const day = String(date.getDate()).padStart(2, '0');
    const hours = String(date.getHours()).padStart(2, '0');
    const minutes = String(date.getMinutes()).padStart(2, '0');
    const seconds = String(date.getSeconds()).padStart(2, '0');
    return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
}
//在未來預測的圖表上可以標記不同天的時間
function checksplunkday(timestamp, prevTimestamp = null) {
    const date = new Date(timestamp);
    const prevDate = prevTimestamp ? new Date(prevTimestamp) : null;
    const hours = String(date.getHours()).padStart(2, '0');
    const minutes = String(date.getMinutes()).padStart(2, '0');
    if (prevDate && prevDate.toDateString() !== date.toDateString()) {
        return `${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')} ${hours}:${minutes}`;
    }
    return `${hours}:${minutes}`;
    console.log("有改")
}

function splunktempChart(arr) {  
    if (!arr || !Array.isArray(arr)) {
        console.warn("傳入的 arr 不是陣列或為空值:", arr);
        return; // 不繼續執行
    }
    let timeLabels = arr.map((item, index) => {
        const prevTime = index > 0 ? arr[index - 1]._time : null;
        return checksplunkday(item._time, prevTime);
    });
    let predictedValues = arr.map(item => {
        const value = parseFloat(item["predicted(AVG_Temperature)"]);
        return isNaN(value) ? null : value;
    }).filter(value => value !== null);
    const minValue = Math.min(...predictedValues);
    const maxValue = Math.max(...predictedValues);
    const padding = (maxValue - minValue) * 0.2;
    const adjustedMin = minValue - padding;
    const adjustedMax = maxValue + padding;
    const options = {
        chart: { type: "line", height: 400, background: "transparent" },
        series: [{ name: "數據", type: "line", data: predictedValues }],

//設定歷史查詢時間
function setTodayDate() {
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0'); // 月份從 0 開始，所以加 1
    const dd = String(today.getDate()).padStart(2, '0');
    const formattedDate = `${yyyy}-${mm}-${dd}`;
}
//設定異常查詢時間
function setAbnormalDayDate() {
    const today = new Date();

    // 設定今天的日期
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0'); // 月份從 0 開始，所以加 1
    const dd = String(today.getDate()).padStart(2, '0');

    // 設定前三天的日期
    const threeDaysAgo = new Date();
    threeDaysAgo.setDate(today.getDate() - 3); // 將日期往前調整 3 天
    const yyyyAgo = threeDaysAgo.getFullYear();
    const mmAgo = String(threeDaysAgo.getMonth() + 1).padStart(2, '0'); // 月份從 0 開始，所以加 1
    const ddAgo = String(threeDaysAgo.getDate()).padStart(2, '0');

    // 組合成 yyyy-mm-dd 格式
    const formattedToday = `${yyyy}-${mm}-${dd}`;
    const formattedThreeDaysAgo = `${yyyyAgo}-${mmAgo}-${ddAgo}`;

    // 將日期填入對應的 input
    document.getElementById("abnormalStartDateTime").value = formattedThreeDaysAgo; // 前三天
    document.getElementById("abnormalEndDateTime").value = formattedToday;         // 今天
    console.log("設置異常時間")
}


document.getElementById("abnormalDataModal").addEventListener('shown.bs.modal', function() {
    setAbnormalDayDate();

    const flipDate = localStorage.getItem('selectedFlipDate');
    if (flipDate) {
        document.getElementById("abnormalEndDateTime").value = flipDate;
    }

    pushhisData("abnormalDataModal");
});

//請求數據後畫圖(異常)
function upaaadateChart() {
    const startDate = document.getElementById("abnormalStartDateTime").value;
    const endDate = document.getElementById("abnormalEndDateTime").value;
    
    if (!abnormalData || abnormalData.length === 0) {
        console.warn("沒有可用的數據來渲染圖表");
        return;
    }

    const filteredData = abnormalData.filter(record => {
        const recordDate = record[0].split(' ')[0]; 
        return (!startDate || recordDate >= startDate) && (!endDate || recordDate <= endDate);
    });

    if (filteredData.length === 0) {
        console.warn("沒有符合篩選條件的數據");
        return;
    }

    const temperatures = filteredData.map(record => [record[0], record[1]]);
    const pHValues = filteredData.map(record => [record[0], record[2]]);
    const DOValues = filteredData.map(record => [record[0], record[3]]);
    const ORPValues = filteredData.map(record => [record[0], record[4]]);
    const SALTValues = filteredData.map(record => [record[0], record[5]]);
    
    renderAbnormalChart(temperatures, pHValues, DOValues, ORPValues, SALTValues);
}

function renderAbnormalChart(temperatures = [], pHValues = [], DOValues = [], ORPValues = [], SALTValues = []) {
    const chartContainer = document.getElementById("abnormalChart");
    if (!chartContainer) {
        console.error("找不到圖表容器 #abnormalChart");
        return;
    }
    document.getElementById("abnormalChartContainerWrapper").style.display = "block";

    // 準備 x 軸標籤
    const xAxisLabels = temperatures.map(record => {
        const date = new Date(record[0]);
        const M = String(date.getMonth()+1).padStart(2,'0');
        const D = String(date.getDate()).padStart(2,'0');
        const h = String(date.getHours()).padStart(2,'0');
        return `${M}-${D} ${h}`;
    });

    // 設定所有 series
    const seriesArr = [
        { name: '溫度 (°C)', data: temperatures.map(r => r[1]) },
        { name: '酸鹼值 (pH)', data: pHValues.map(r => r[1]) },
        { name: '溶氧量 (mg/L)', data: DOValues.map(r => r[1]) },
        { name: 'ORP (mV)',    data: ORPValues.map(r => r[1]) },
        { name: '鹽度 (psu)',  data: SALTValues.map(r => r[1]) }
    ];

    const options = {
        chart: {
            type: 'line',
            width: '100%',
            events: {
                // 圖表掛載後，隱藏除了溫度 (index 0) 以外的所有 series
                mounted: function(chartCtx, config) {
                    config.globals.seriesNames.forEach((nm, idx) => {
                        if (idx !== 0) {
                            chartCtx.hideSeries(nm);
                        }
                    });
                },
                // 點圖例後只顯示被點擊那一條
                legendClick: function(chartCtx, seriesIndex, config) {
                    config.globals.seriesNames.forEach(nm => chartCtx.hideSeries(nm));
                    const sel = config.globals.seriesNames[seriesIndex];
                    chartCtx.showSeries(sel);
                    return false;
                }
            }
        },
        series: seriesArr,
        xaxis: {
            categories: xAxisLabels,
            tickAmount: 6,
            labels: { rotate: 0, style: { fontSize: '12px' } }
        },
        tooltip: { shared: true, intersect: false },
        legend: {
            position: 'top',
            fontSize: '14px'
        }
    };

    // 如果已經有舊圖表，先銷毀
    if (window.abnormalChartInstance) {
        window.abnormalChartInstance.destroy();
    }
    // 建立新圖表
    window.abnormalChartInstance = new ApexCharts(chartContainer, options);
    window.abnormalChartInstance.render();
}
