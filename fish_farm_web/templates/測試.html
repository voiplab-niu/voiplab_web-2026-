<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApexCharts - 過去與未來區分</title>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
</head>
<body>

    <div id="chart"></div>

    <script>
        var options = {
            chart: {
                type: 'line',
                height: 350
            },
            stroke: {
                width: 3
            },
            series: [{
                name: "數據",
                data: [10, 15, 13, 20, 18, 25, 30, 28, 35, 40, 38, 45]  // 整條數據，過去+未來
            }],
            xaxis: {
                categories: ["Point 1", "Point 2", "Point 3", "Point 4", "Point 5", "Point 6", "Point 7", "Point 8", "Point 9", "Point 10", "Point 11", "Point 12"]
            },
            
        };

        var chart = new ApexCharts(document.querySelector("#chart"), options);
        chart.render();
    </script>

</body>
</html>
