    <script>
        let currentPondId = 1;

        
        window.addEventListener("DOMContentLoaded", function () {
          updateStatus(1); 
          if (typeof Paho === "undefined") {
            console.error("Paho MQTT 庫未正確加載");
            document.getElementById("status").textContent = "錯誤：MQTT 庫加載失敗";
            return;
          }
    
          const clientId = "webclient_" + Math.random().toString(16).substr(2, 8);
          const client = new Paho.Client("voiplab.niu.edu.tw", 9001, clientId);
    
          const status = document.getElementById("status");
          const imgMap = {
            "USC/front": document.getElementById("video1"),
            "USC/side": document.getElementById("video2"),
            "USC/top": document.getElementById("video3")
          };
    
          client.onConnectionLost = e => {
            status.textContent = "連線中斷：" + e.errorMessage;
          };
    
          client.onMessageArrived = function (message) {
            const topic = message.destinationName;
            const imgElement = imgMap[topic];
            if (imgElement) {
              imgElement.src = "data:image/jpeg;base64," + message.payloadString;
            }
          };
    
          client.connect({
            onSuccess: function () {
              
              client.subscribe("USC/front");
              client.subscribe("USC/side");
              client.subscribe("USC/top");
            },
            
            useSSL: true
          });
        });
      </script>

        // 更新卡片內容
        function updateStatus(pondId) {
    currentPondId = pondId; // 記住目前的魚池
    latestData = {
        temperature: 0,
        ph: 0,
        do: 0,
        orp: 0,
        salt: 0
    };
    const behaviorCard = document.getElementById("behaviorCard");
    const feedCard = document.getElementById("feedCard"); // 拿到飼料卡片

    // 更新行為資料
    const behaviorData = pondData[pondId].behavior;
    document.getElementById("behaviorText").textContent = behaviorData.status;
    toggleCardStyle(behaviorCard, behaviorData.status);

    // 更新飼料資料
    const feedData = pondData[pondId].feed;
    if (feedData) {
        document.getElementById("feedText").textContent = feedData.status;
        toggleCardStyle(feedCard, feedData.status);
    } else {
        document.getElementById("feedText").textContent = "正常";
        feedCard.classList.remove("abnormal", "normal");
        feedCard.classList.add("normal"); // 沒有資料也保持正常樣式
    }

    
}



        // 設定卡片樣式（正常/異常）
        function toggleCardStyle(card, status) {
            // 清除所有可能的樣式
            card.classList.remove("abnormal", "normal");

            // 根據狀態新增樣式
            if (status === "異常") {
                card.classList.add("abnormal");
            } else {
                card.classList.add("normal");
            }
        }

        // 點擊卡片轉跳對應魚池頁面
        function redirectToFishPage(filterType) {
            location.href = `https://voiplab.niu.edu.tw/fish_farm/fish${currentPondId}.html?tab=alert-events&filter=${filterType}`;
        }
        //物件事件
        function showChartContainer() {
            document.getElementById("chartContainerWrapper").style.display = "block";
        }
 /*從後端拿異常閥值api*/
        function fetchAlertThresholds() {
    fetch('/fish_farm/get-alert-thresholds')
        .then(response => {
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            return response.json();
        })
        .then(data => {
            console.log("從後端獲取的閾值:", data); // 檢查閾值是否正確

            if (data.error) {
                console.warn("閾值資料為空或異常：", data.error);
                return;
            }

            // 對應 alertThresholds 物件
            alertThresholds.temp_Min = data.temp_Min;
            alertThresholds.temp_Max = data.temp_Max;
            alertThresholds.phMin = data.phMin;
            alertThresholds.phMax = data.phMax;
            alertThresholds.doMin = data.doMin;
            alertThresholds.doMax = data.doMax;
            alertThresholds.orpMin = data.orpMin;
            alertThresholds.orpMax = data.orpMax;
            alertThresholds.saltMin = data.saltMin;  // 這裡你資料庫叫做 amMin
            alertThresholds.saltMax = data.saltMax;  // 這裡你資料庫叫做 amMax

            console.log("✅ 成功讀取閾值設定：", alertThresholds);
        })
        .catch(error => {
            console.error('⚠️ 無法取得閾值設定:', error);
        });
}

if (sensorList.includes(e.df_name)) {

    arr.forEach(dataPacket => {
    const [timestamp, sensorInfo] = dataPacket;
    const sensorName = sensorInfo[2]; // 例如 "DO_Sensor3"

    // 提取魚池ID (從感測器名稱最後一個字元)
    const pondId = parseInt(sensorName.slice(-1)); // "DO_Sensor3" → 3

    // 只處理當前魚池的數據
    if (pondId !== currentPondId) {
        
        return; // 跳過非當前魚池的數據
    }

    // 靜態映射表（保持原有結構，僅處理當前魚池）
    const sensorMapping = {
        "DO_Sensor": "do",
        "ORP_Sensor": "orp",
        "PH_Sensor": "ph",
        "Temperature_Sensor": "temperature",
        "Salinity_Sensor": "salt"
    };

    // 匹配感測器類型 (移除末尾數字)
    const sensorType = sensorName.replace(/\d+$/, "");
    const field = sensorMapping[sensorType];

    if (field) {
        latestData[field] = parseFloat(sensorInfo[3]);
    }
});

    // 时间戳处理 (取第一个有效时间戳)
    const validTimestamp = arr[0]?.[0]?.split('.')[0]?.replace('T', ' ') || 
                          new Date().toISOString().slice(0, 19).replace('T', ' ');
    latestData.time = validTimestamp;

    // 数据完整性检查
    const requiredFields = ['temperature', 'ph', 'do', 'orp', 'salt'];
    if (requiredFields.every(field => latestData[field] !== undefined)) {
        checkForAlerts(latestData);
        updateWaterQualityDisplay();  // 新增此行
    } else {
        console.error('缺失必要字段，无法检测警报');
    }
}

    // 歷史數據
    if (e.df_name === "History-O") {
        //確保e.dataArr有數據
        if (e.dataArr && e.dataArr.length > 0 && e.dataArr[0][1] && e.dataArr[0][1].length > 0) {
            var arr = e.dataArr[0][1][0]; // 取得歷史數據
            data = arr;
            //console.log("history" + data);
            if (data && data.length > 0) {
                
                updateChart();    
            } 
            } else {
                console.warn("沒有接收到有效的歷史數據");
            }
    }
});
function checkForAlerts(data) {
    
    // 檢查各項數值是否超出閾值
    const isValid = {
        temperature: data.temperature && data.temperature !== 0,
        ph: data.ph && data.ph !== 0,
        do: data.do && data.do !== 0,
        orp: data.orp && data.orp !== 0,
        salt: data.salt && data.salt !== 0
    };

    // 檢查各項數值是否超出閾值（僅在數據有效時檢查）
    const isAbnormal = {
        temperature: isValid.temperature && (data.temperature < alertThresholds.temp_Min || data.temperature > alertThresholds.temp_Max),
        ph: isValid.ph && (data.ph < alertThresholds.phMin || data.ph > alertThresholds.phMax),
        do: isValid.do && (data.do < alertThresholds.doMin || data.do > alertThresholds.doMax),
        orp: isValid.orp && (data.orp < alertThresholds.orpMin || data.orp > alertThresholds.orpMax),
        salt: isValid.salt && (data.salt < alertThresholds.saltMin || data.salt > alertThresholds.saltMax)
    };
    const idMap = {
        temperature: 'temperaturecol',
        ph:          'pHcol',
        do:          'DOcol',
        orp:         'ORPcol',
        salt:        'saltcol'
    };
    // 更新水質卡片樣式
    Object.keys(isAbnormal).forEach(key => {
        const el = document.getElementById(idMap[key]);
        if (el) {
            el.classList.remove('abnormal', 'normal');
            el.classList.add(isAbnormal[key] ? 'abnormal' : 'normal');
        }
    });

    // 若有異常，發送通知
    if (Object.values(isAbnormal).some(v => v)) {
        let alertMessage = "水質異常：";
        let abnormalities = [];

        if (isAbnormal.temperature) {
            abnormalities.push(`溫度 ${data.temperature}°C`);
        }
        if (isAbnormal.ph) {
            abnormalities.push(`pH ${data.ph}`);
        }
        if (isAbnormal.do) {
            abnormalities.push(`溶氧 ${data.do} mg/L`);
        }
        if (isAbnormal.orp) {
            abnormalities.push(`ORP ${data.orp} mV`);
        }
        if (isAbnormal.salt) {
            abnormalities.push(`鹽度 ${data.salt} PSU`);
        }
        ;
        // 呼叫後端正式記錄異常
        fetch('/fish_farm/api/sensor-data', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
        pond_id: currentPondId,
        temperature: data.temperature,
        ph: data.ph,
        do: data.do,
        orp: data.orp,
        salt: data.salt,
        timestamp: data.time // e.g., "2025-05-20 14:32:15"
        })

        
    }).then(response => {
    if (!response.ok) {
        console.error("後端錯誤:", response.statusText);
    }
    return response.json();
});

        
    }
}


function updateWaterQualityDisplay() {
    
    // 更新溫度
    document.getElementById('temperature').textContent = `${latestData.temperature}°C`;
    // 更新 pH
    document.getElementById('pH').textContent = `${latestData.ph}`;
    // 更新溶氧
    document.getElementById('DO').textContent = `${latestData.do} mg/L`;
    // 更新鹽度
    document.getElementById('salt').textContent = `${latestData.salt} PSU`;
    // 更新 ORP
    document.getElementById('ORP').textContent = `${latestData.orp} mV`;
    // 更新時間
    document.getElementById('updateTime').textContent = latestData.time;
}
                
        //設定歷史查詢時間
        function setTodayDate() {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0'); // 月份從 0 開始，所以加 1
            const dd = String(today.getDate()).padStart(2, '0');
            const formattedDate = `${yyyy}-${mm}-${dd}`;
            document.getElementById("startDateTime").value = formattedDate;
            document.getElementById("endDateTime").value = formattedDate;
        }
        //歷史圖表
        function updateChart() {
            const startDate = document.getElementById("startDateTime").value;
            const endDate = document.getElementById("endDateTime").value;
            const filteredData = data.filter(record => {
                const recordDate = record[0].split(' ')[0]; 
                return (!startDate || recordDate >= startDate) && (!endDate || recordDate <= endDate);
            });
            const temperatures = filteredData.map(record => [record[0], record[1]]);
            const pHValues = filteredData.map(record => [record[0], record[2]]);
            const DOValues = filteredData.map(record => [record[0], record[3]]);
            const ORPValues = filteredData.map(record => [record[0], record[4]]);
            const SALTValues = filteredData.map(record => [record[0], record[5]]);
            renderChart(temperatures, pHValues, DOValues, ORPValues, SALTValues);
            
        }
        function renderChart(temperatures = [], pHValues = [], DOValues = [], ORPValues = [], SALTValues = []) {
            // 將時間格式轉為 "MM-DD HH"
            const xAxisLabels = temperatures.map(record => {
                const dateTime = record[0];
                const date = new Date(dateTime);
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                const hour = String(date.getHours()).padStart(2, '0');
                return `${month}-${day} ${hour}`;
            });

            const options = {
                chart: {
                    type: 'line',
                    width: '100%',
                    events: {
                        mounted: function(chartContext, config) {
                            // 預設只顯示第一條線（溫度），其他線條關閉
                            chartContext.toggleSeries('酸鹼值 (pH)');
                            chartContext.toggleSeries('溶氧量 (mg/L)');
                            chartContext.toggleSeries('ORP (mV)');
                            chartContext.toggleSeries('鹽度 (psu)');
                        }
                    },
                    legendClick: function(chartContext, series, seriesIndex, config) {
                        // 單選模式：點某一條線時，關閉其他線
                        config.series.forEach((s, i) => {
                            if (i !== seriesIndex && chartContext.isSeriesVisible(s.name)) {
                                chartContext.toggleSeries(s.name); // 關閉其他線
                            }
                        });
                        // 如果目前這條線是關閉的，就開啟（toggle 是必要的）
                        if (!chartContext.isSeriesVisible(series.name)) {
                            chartContext.toggleSeries(series.name);
                        }
                        return false; // 阻止預設行為（不要自己 toggle）
                    }   
                },
                series: [
                    { name: '溫度 (°C)', data: temperatures.map(record => record[1]) },
                    { name: '酸鹼值 (pH)', data: pHValues.map(record => record[1]) },
                    { name: '溶氧量 (mg/L)', data: DOValues.map(record => record[1]) },
                    { name: 'ORP (mV)', data: ORPValues.map(record => record[1]) },
                    { name: '鹽度 (psu)', data: SALTValues.map(record => record[1]) }
                ],
                xaxis: {
                    categories: xAxisLabels,
                    tickAmount: 6, // 僅顯示最多 6 個標籤
                    labels: {
                        rotate: 0, // 禁止標籤旋轉
                        style: {
                            fontSize: '16px',
                            fontWeight: 'bold',
                            fontFamily: 'Arial, sans-serif',
                        },
                    },
                },
                tooltip: {
                    enabled: true,
                    shared: true,
                    intersect: false,
                    x: {
                        formatter: function(value, { dataPointIndex }) {
                            return xAxisLabels[dataPointIndex]; // 工具提示顯示完整日期
                        }
                    },
                    y: {
                        formatter: function(value, { seriesIndex, w }) {
                            const seriesName = w.globals.seriesNames[seriesIndex];
                            return `${seriesName}: ${value}`;
                        }
                    }
                },
                legend: {
                    fontSize: '20px',
                    labels: {
                        useSeriesColors: true,
                    }
                },
            };

            // 銷毀舊圖表並繪製新圖表
            if (bottomChart && typeof bottomChart.destroy === 'function') {
                bottomChart.destroy();
            }
            bottomChart = new ApexCharts(document.querySelector("#bottomChart"), options);
            bottomChart.render();
        }

        // 預設載入第一個魚池數據
        updateStatus(1);
        
        window.onload = function() {
            daiSDK = dai(); // 初始化 daiSDK 
            
            /*透過api接收異常閥值*/
            fetchAlertThresholds();
            /*設定日期*/
            setTodayDate();

            
            setInterval(fetchAlertThresholds, 30000);
        };



        
    </script>
    <!-- 引入外部的 JavaScript 文件 -->
    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
    <script>
        let currentPond = 1;  // 預設魚池一
        
        function updateStatus(pond) {
            currentPondId = pond; // 更新全局变量
        }
        
        // 每2秒拉一次資料
        setInterval(() => {
        fetch(`/fish_farm/get_status?pond=${currentPondId}`)
        .then(response => {
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            return response.json();
        })
        .then(data => {
            const card = document.getElementById('behaviorCard');
            const text = document.getElementById('behaviorText');

            // 清除所有可能樣式
            card.classList.remove("normal", "abnormal");
            
            if (data.status === '未處理') {
                card.classList.add("abnormal");
                text.textContent = '異常';
            } else if (data.status === '已處理') {
                card.classList.add("normal");  // 或者你可以定義另一個 CSS 類
                text.textContent = '正常';
            
            } else {
                card.classList.add("normal");
                text.textContent = '正常';
            }
        })
        .catch(err => {
            console.error('Error:', err);
            const card = document.getElementById('behaviorCard');
            const text = document.getElementById('behaviorText');
            card.classList.remove("normal", "abnormal");
            card.classList.add("abnormal");  // 或者定義一個錯誤專用的 CSS 類
            text.textContent = '連線錯誤';
        });
}, 2000);

        </script>
