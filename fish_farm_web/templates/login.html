<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入頁面</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        /* 畫面整體置中 */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f0f2f5;
            font-family: Arial, sans-serif;
        }
    
        .login-container {
            width: 100%;
            max-width: 360px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            text-align: center;
            box-sizing: border-box;
        }
    
        .login-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
    
        .google-login-btn {
            background: #4285F4;
            color: white;
            padding: 12px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            transition: 0.3s;
            width: 100%;
            box-sizing: border-box;
        }
    
        .google-login-btn:hover {
            background: #357ABD;
        }
    
        .divider {
            text-align: center;
            margin: 20px 0;
            color: #666;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    
        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid #ddd;
            margin: 0 10px;
        }
    
        form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    
        input, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
    
        button[type="submit"] {
            background: #00796B;
            color: white;
            border: none;
            cursor: pointer;
        }
    
        .error-message {
            color: red;
            margin-top: 10px;
        }
    
        /* ✅ 響應式設計 */
        @media (max-width: 480px) {
            .login-container {
                margin: 20px;
                padding: 20px;
                border-radius: 8px;
            }
    
            .google-login-btn {
                font-size: 14px;
                padding: 10px;
            }
    
            input, button {
                padding: 10px;
            }
        }
    </style>
    
</head>
<body>
    <div class="login-container">
        <h1>選擇登入方式</h1>
        
        <!-- Google 登入 -->
        <div class="login-options">
            <a href="{{ url_for('google_login') }}" class="google-login-btn">

                <img src="{{ url_for('static', filename='images/google-logo.jpg') }}" width="20" alt="Google">
                使用google帳號登入
            </a>
        </div>

        <div class="divider">或</div>

        <!-- 帳號密碼登入 -->
        <form method="POST">
            <input type="text" name="username" placeholder="用戶名" required>
            <input type="password" name="password" placeholder="密碼" required>
            <button type="submit">帳號登入</button>
        </form>

        <!-- 錯誤訊息 -->
        {% if error %}
            <p class="error-message">{{ error }}</p>
        {% endif %}
    </div>
</body>
</html>
