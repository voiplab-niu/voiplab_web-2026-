<script>


// 定義閾值
let alertThresholds = {
    temp_Min: 0,
    temp_Max: 0,
    phMin: 0,
    phMax: 0,
    doMin: 0,
    doMax: 0,
    rpoMin: 0,
    rpoMax: 0,
    saltMin: 0,
    saltMax: 0
};

function fetchAlertThresholds() {
    fetch('/fish_farm/get-alert-thresholds')
        .then(response => {
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            return response.json();
        })
        .then(data => {
            Object.assign(alertThresholds, data);
        })
        .catch(error => {
            console.error('發生錯誤:', error);
        });
}

function checkForAlerts(latestData) {
    let { temperature, pH, DO, ORP, salt, time } = latestData;
    let alertMessages = [];
    let hasAlert = false;
    let alertType = "水質異常"; // 預設為水質異常
    document.getElementById("updateTime").textContent = `${latestData.time}`;
    document.getElementById("temperature").textContent = `${latestData.temperature}°C`;
    document.getElementById("pH").textContent = `${latestData.pH}`;
    document.getElementById("DO").textContent = `${latestData.DO}mg/L`;
    document.getElementById("ORP").textContent = `${latestData.ORP}mV`;
    document.getElementById("salt").textContent = `${latestData.salt}psu`;

    // 🔴 溫度異常
    if (temperature < alertThresholds.temp_Min || temperature > alertThresholds.temp_Max) {
        alertMessages.push(`溫度異常: ${temperature}°C`);
        hasAlert = true;
        document.getElementById("temperatureCard").classList.add("alert-card");
    } else {
        document.getElementById("temperatureCard").classList.remove("alert-card");
    }

    // 🟢 pH 異常
    if (pH < alertThresholds.phMin || pH > alertThresholds.phMax) {
        alertMessages.push(`pH值異常: ${pH}`);
        hasAlert = true;
        document.getElementById("pHCard").classList.add("alert-card");
    } else {
        document.getElementById("pHCard").classList.remove("alert-card");
    }

    // 🟠 溶氧量異常
    if (DO < alertThresholds.doMin || DO > alertThresholds.doMax) {
        alertMessages.push(`溶氧量異常: ${DO} mg/L`);
        hasAlert = true;
        document.getElementById("DOCard").classList.add("alert-card");
    } else {
        document.getElementById("DOCard").classList.remove("alert-card");
    }

    // 🔵 氧化還原電位異常
    if (ORP < alertThresholds.rpoMin || ORP > alertThresholds.rpoMax) {
        alertMessages.push(`氧化還原電位異常: ${ORP}mV`);
        hasAlert = true;
        document.getElementById("ORPCard").classList.add("alert-card");
    } else {
        document.getElementById("ORPCard").classList.remove("alert-card");
    }

    // 🟡 鹽度異常
    if (salt < alertThresholds.saltMin || salt > alertThresholds.saltMax) {
        alertMessages.push(`鹽度異常: ${salt}ppt`);
        hasAlert = true;
        document.getElementById("saltCard").classList.add("alert-card");
    } else {
        document.getElementById("saltCard").classList.remove("alert-card");
    }

    // 如果有異常，插入異常事件到網頁
    if (alertMessages.length > 0) {
        // 插入異常事件到表格
        const newAlert = {
            id: generateUUID(),  // 生成唯一 ID
            type: alertType,
            content: alertMessages.join("<br>"), // 用 <br> 讓內容換行
            time: latestData.time, 
            status: "未處理",
            video: "沒有影像"
        };

   
    }

    // 🚨 判斷是否發送通知
    if (hasAlert) {
        console.log("⚠️ 檢測到異常，開始判斷是否應發送通知...");
        if (shouldSendNotification()) {
            let fullAlertMessage = alertMessages.join("\n"); // 合併所有異常資訊
            sendLineNotify(alertType, fullAlertMessage); // 發送 LINE Notify
        } else {
            console.log("通知被抑制，距離上次已確認不到 30 分鐘。");
        }
    }
}
// 產生唯一 ID
function generateUUID() {
    return 'xxxx-4xxx-yxxx'.replace(/[xy]/g, function (c) {
        let r = Math.random() * 16 | 0,
            v = c == 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
    });
}
function shouldSendNotification() {
    if (lastConfirmedTime) {
        const now = new Date();
        const diffMinutes = (now - lastConfirmedTime) / (1000 * 60); // 計算與上次「已確認」的時間差
        console.log(`距離上次確認的時間差: ${diffMinutes.toFixed(2)} 分鐘`);
        return diffMinutes > 30; // 超過 30 分鐘才允許發送
    }
    console.log("未檢測到已確認狀態，允許發送通知。");
    return true; // 如果沒有記錄確認時間，允許發送
}
//發送LINE通知
function sendLineNotify(alertType, message, videoUrl = null) {
    // 向後端發送 POST 請求
    fetch('/fish_farm/send_notify', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: new URLSearchParams({
            'alertType':alertType,
            'message': message
        })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            const alertId = data.alert_id;  // 從後端回應中獲取 alert_id
            // 建立警報數據物件
            const alertData = {
                id: alertId,
                type: alertType,
                content: message,
                time: new Date().toLocaleString(),
                status: "未處理",
                video:videoUrl
            };
            // 插入到警報表格中
            console.log(alertData)
            addAlertEvent(alertData);
        } else {
            console.error('LINE Notify 發送失敗');
        }
    })
    .catch(error => console.error('Error:', error));
}

/*sendWebhook(備用)*/
function sendWebhook(message) {
    const payload = {
        text: message // 設置要發送的訊息
    };

    fetch('/send-webhook', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload)
    })
    .then(response => response.json())
    .then(data => {
        console.log('Webhook 發送成功:', data);
    })
    .catch(error => {
        console.log('Webhook 發送失敗:', error);
    });
}

// 記錄上次確認的時間
let lastConfirmedTime = null;
function fetchAlertFeedback() {
    fetch('/fish_fram/get_alert_feedback')
        .then(response => response.json())
        .then(data => {
            console.log('回應資料:', data);  // 顯示從後端獲得的資料

            let hasConfirmedStatus = false;  // 用來標記是否有「已確認」狀態

            for (const alertId in data) {
                const status = data[alertId].status;
                console.log(`更新警報 ${alertId} 狀態為: ${status}`);

                // 更新表格或其他顯示
                updateAlertStatus(alertId, status);

                if (status === "已確認") {
                    // 記錄當前時間
                    lastConfirmedTime = new Date();
                    hasConfirmedStatus = true; // 標記為已確認狀態
                    console.log(`已確認狀態，記錄時間: ${lastConfirmedTime}`);
                }
            }

            if (!hasConfirmedStatus) {
                // 沒有已確認狀態，則允許發送通知
                console.log("沒有發現已確認狀態，允許發送通知。");
                lastConfirmedTime = null; // 清空 lastConfirmedTime
            }

        })
        .catch(error => console.error('Error fetching feedback:', error));
}
function updateAlertStatus(alertId, status) {
    const row = document.querySelector(`tr[data-alert-id="${alertId}"]`);
    if (row) {
        const statusCell = row.querySelector('td:nth-child(5)');  // 確保選擇的是狀態欄位
        if (statusCell) {
            statusCell.textContent = status;  // 更新狀態
        }
    } else {
        console.log('找不到對應的 alert_id:', alertId);
    }
}

const alertBody = document.getElementById("alertBody");//物件當作變數
function addAlertEvent(alert) {
    const row = document.createElement("tr");
    row.innerHTML = `
        <td>${alert.id}</td>

function formatTime(timeString) {
    const date = new Date(timeString); // 將 ISO 字符串轉換為 Date 物件
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0'); // 月份是 0-11，需要加 1
    const day = String(date.getDate()).padStart(2, '0');
    const hours = String(date.getHours()).padStart(2, '0');
    const minutes = String(date.getMinutes()).padStart(2, '0');
    const seconds = String(date.getSeconds()).padStart(2, '0');

    // 返回格式為：YYYY-MM-DD HH:MM:SS
    return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
}
//在未來預測的圖表上可以標記不同天的時間
function checksplunkday(timestamp, prevTimestamp = null) {
    const date = new Date(timestamp);
    const prevDate = prevTimestamp ? new Date(prevTimestamp) : null;
    const hours = String(date.getHours()).padStart(2, '0');
    const minutes = String(date.getMinutes()).padStart(2, '0');
    if (prevDate && prevDate.toDateString() !== date.toDateString()) {
        return `${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')} ${hours}:${minutes}`;
    }
    return `${hours}:${minutes}`;
    console.log("有改")
}

function setTodayDate() {
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0'); // 月份從 0 開始，所以加 1
    const dd = String(today.getDate()).padStart(2, '0');
    const formattedDate = `${yyyy}-${mm}-${dd}`;
    document.getElementById("startDateTime").value = formattedDate;
    document.getElementById("endDateTime").value = formattedDate;
}
//設定異常查詢時間
function setAbnormalDayDate() {
    const today = new Date();

    // 設定今天的日期
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0'); // 月份從 0 開始，所以加 1
    const dd = String(today.getDate()).padStart(2, '0');

    // 設定前三天的日期
    const threeDaysAgo = new Date();
    threeDaysAgo.setDate(today.getDate() - 3); // 將日期往前調整 3 天
    const yyyyAgo = threeDaysAgo.getFullYear();
    const mmAgo = String(threeDaysAgo.getMonth() + 1).padStart(2, '0'); // 月份從 0 開始，所以加 1
    const ddAgo = String(threeDaysAgo.getDate()).padStart(2, '0');

    // 組合成 yyyy-mm-dd 格式
    const formattedToday = `${yyyy}-${mm}-${dd}`;
    const formattedThreeDaysAgo = `${yyyyAgo}-${mmAgo}-${ddAgo}`;

    // 將日期填入對應的 input
    document.getElementById("abnormalStartDateTime").value = formattedThreeDaysAgo; // 前三天
    document.getElementById("abnormalEndDateTime").value = formattedToday;         // 今天
    console.log("設置異常時間")
}
