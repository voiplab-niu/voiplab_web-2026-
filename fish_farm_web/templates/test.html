<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>發送訊息到 Teams</title>
</head>
<body>
    <h2>輸入訊息發送到 Microsoft Teams</h2>
    <form id="messageForm">
        <label for="alertType">類型：</label>
        <input type="text" id="alertType" name="alertType" placeholder="例如：測試警報" required><br><br>
        
        <label for="message">內容：</label>
        <input type="text" id="message" name="message" placeholder="輸入警報內容" required><br><br>
        
        <button type="submit">送出</button>
    </form>

    <p id="response"></p>

    <script>
        document.getElementById('messageForm').addEventListener('submit', function (e) {
            e.preventDefault(); // 防止表單預設行為

            const message = document.getElementById('message').value;
            const alertType = document.getElementById('alertType').value;

            fetch('https://voiplab.niu.edu.tw/fish_farm/send_notify', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: 'message=' + encodeURIComponent(message) + '&alertType=' + encodeURIComponent(alertType)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('response').textContent = '✅ 訊息已送出！警報 ID：' + data.alert_id;
                } else {
                    document.getElementById('response').textContent = '❌ 發送失敗：' + (data.error || '未知錯誤');
                }
            })
            .catch(error => {
                console.error('錯誤:', error);
                document.getElementById('response').textContent = '❌ 發送失敗（連線錯誤）';
            });
        });
    </script>
</body>
</html>
