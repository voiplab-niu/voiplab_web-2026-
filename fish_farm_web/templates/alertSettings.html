    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0px;
            padding: 0;
            background-color: #cce7ff;
        }

        /* 標題樣式 */
        h1 {
            text-align: center;
            color: #000000;
            margin-top: 20px;
            animation: bounceIn 0.6s ease-in-out; /* 動態彈跳效果 */
            font-size: 3rem;
        }

        /* 設置異常值的區域樣式 */
        #alertSettings {
            background-color: #ffffff; /* 純白色背景保持清晰 */
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: 30px auto;
            animation: slideIn 0.8s ease-out; /* 左右滑入效果 */
        }
        .input-pair {
            display: flex;
            justify-content: space-between;
            gap: 20px; /* 輸入框之間的間距 */
        }

        .input-pair input {
            width: 48%; /* 使每個輸入框佔據 50% 的寬度 */
            padding: 12px; /* 增加內邊距 */
            font-size: 1.1rem; /* 增加字體大小 */
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            margin-bottom: 10px; /* 輸入框和下一個元素之間的間距 */
        }
        #lastUpdatedTime {
            text-align: left; 
            font-size: 1.2rem; 
            color: #34495e; 
            margin-bottom: 15px;
        }

        /* 按钮样式 */
        #successMessage {
            color: #28a745;
            margin-top: 15px;
            display: none; /* 默认隐藏 */
        }       


        #navButton:hover {
            background-color: #004d40;
        }

        /* 表單標籤樣式 */
        label {
            display: block;
            font-size: 1.4rem; /* 增加標籤字體大小 */
            margin-bottom: 8px;
            color: #000000;
        }

        /* 輸入框樣式 */
        input[type="number"] {
            width: 100%; /* 輸入框寬度 100% */
            padding: 12px; /* 增加內邊距 */
            font-size: 1.3rem; /* 增加字體大小 */
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            margin-bottom: 10px; /* 輸入框和下一個元素之間的間距 */
        }

        /* 輸入框獲得焦點時的樣式 */
        input[type="number"]:focus {
            border-color: #ff002b; /* 焦點時顯示藍色邊框 */
            outline: none;
            transform: scale(1.05); /* 輸入框輕微放大效果 */
        }
        

        /* 按鈕樣式 */
        #saveThresholds {
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%; /* 使按鈕寬度為 100% */
            margin-top: 20px;
        }
        .form-group {
            margin-bottom: 20px; /* 每個表單項目的間距 */
        }

        /* 按鈕懸停時的樣式 */
        #saveThresholds:hover {
            background-color: #2980b9; /* 按鈕懸停時的顏色 */
        }
        #lastUpdatedTime {
            font-size: 1.3rem;
            color: #2c3e50;
            margin-bottom: 25px;
        }
        h3 {
            font-size: 2rem; /* 增加標題字體大小 */
            text-align: center;
            color: #333;
            margin-bottom: 30px; /* 增加標題和表單的間距 */
        }
        #menuButton {
            position: fixed; /* 使用 fixed 以确保按钮始终可见 */
            top: 20px; 
            left: 20px; 
            width: 60px; /* 稍大一点的按钮 */

            background-size: contain; /* 保持图标比例 */

            border: none; 
            border-radius: 10px; /* 圆角效果 */
            cursor: pointer;
            z-index: 1000; /* 确保按钮在其他内容上方 */
            transition: background-color 0.3s, transform 0.3s; /* 平滑过渡效果 */
        }
        #menuButton:hover {
            transform: scale(1.1); /* 鼠标悬停时按钮放大 */
        }
        #menuButton img {
            width: 60px; /* 你可以根據需要調整圖像的大小 */
            height: auto;
            background-color: #00000000;
        }
        
        #sideMenu {
            position: fixed;/* 固定定位，讓菜單保持在窗口中 */

            height:100%;

        #sideMenu a {
            padding: 15px 10px;
            display: block;
            color: white;
            width: auto;
            text-decoration: none;
            font-size: 25px ; 
            transition: background-color 0.3s, padding-left 0.3s; 
            
        }
        #sideMenu a:hover {
            background-color: #1f6d8e; /* 更深的背景色 */
            border-left: 4px solid #ffffff; /* 左侧边框效果 */
            padding-left: 20px; /* 鼠标悬停时的内边距 */
        }

        .dropdown {
            position: relative; /* 設置相對定位，以便下拉內容能夠相對於這個元素定位 */
            cursor: pointer; /* 鼠標懸停時顯示為手型光標 */
        }
        .dropdown-content {
            display: none; /* 初始隱藏 */
            position: absolute; /* 絕對定位 */
            left: 100%; /* 顯示在父項的左側 */
            top: 0; /* 在父項下方顯示 */
            width: 220px; /* 調整寬度 */
            background-color: #37d0db; /* 背景顏色 */
            color: #ffffff; /* 文字顏色 */
            border-radius: 8px; /* 圓角效果 */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2); /* 陰影效果 */
            z-index: 1000; /* 確保在其他內容之上 */
            transition: opacity 0.3s ease, visibility 0.3s ease; /* 平滑過渡效果 */
            opacity: 0; /* 初始透明度 */
            visibility: hidden; /* 初始隱藏 */
        }
        .dropdown:hover .dropdown-content {
            display: block; /* 顯示下拉內容 */
            opacity: 1; /* 變為可見 */
            visibility: visible; /* 使元素可見 */
        }
        .dropdown-content a {
            padding: 15px 25px; /* 內邊距 */
            display: block; /* 塊級元素 */
            color: white; /* 文字顏色 */
            text-decoration: none; /* 去掉下劃線 */
            font-size: 14px; /* 字體大小 */
            transition: background-color 0.3s ease; /* 平滑過渡效果 */
        }
        .dropdown-content a:hover {
            background-color: #1f6d8e; /* 鼠標懸停時的背景顏色 */
            border-left: 4px solid #ffffff; /* 左側邊框效果 */
            padding-left: 30px; /* 鼠標懸停時的內邊距 */
        }
        .menu-item {
            display: flex;
            align-items: center; /* 確保圖片和文本垂直居中對齊 */
            padding-left: 10px; /* 根據需要調整間距 */  
            text-align: left ; /* 讓文字靠左對齊 */  
        }
        .menu-icon {
            border: none; /* 移除圖片的邊框 */
            width: 24px; /* 設置圖片寬度 */
            height: 25px; /* 設置圖片高度 */

        }

        .menu-text {
            flex-grow: 1; /* 讓文字區域占據剩餘空間並推動圖片到右邊 */
        }
        
        #SQR {

            padding: 10px 5px;

        }
        #SLQR:hover {
        background-color: #0288d1;

        /* 動畫效果 - 頁面淡入 */
        @keyframes fadeIn {
            from {

            }
            to {
                opacity: 1;
            }
        }

        /* 動畫效果 - 標題彈跳 */
        @keyframes bounceIn {
            0% {
                transform: scale(0.9);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* 動畫效果 - 滑入效果 */
        @keyframes slideIn {
            from {
                transform: translateX(-100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* 動畫效果 - 自下而上淡入 */
        @keyframes fadeInUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        <div id="alertSettings">

                <span id="timeValue" style="display: block;">尚未更新</span>
            </div>
    
            <!-- 溫度範圍 -->
            <div class="form-group">
                <label for="tempMin">溫度範圍</label>
                <div class="input-pair">
                    <input type="number" id="tempMin" placeholder="例如：7" required>
                    <input type="number" id="tempMax" placeholder="例如：30" required>
                </div>
            </div>
            <!-- pH範圍 -->
            <div class="form-group">
                <label for="pHMin">pH 範圍</label>
                <div class="input-pair">
                    <input type="number" id="pHMin" placeholder="例如：6" required>
                    <input type="number" id="pHMax" placeholder="例如：8" required>
                </div>
            </div>
    
            <!-- 溶氧量範圍 -->
            <div class="form-group">
                <label for="doMin">溶氧量範圍</label>
                <div class="input-pair">
                    <input type="number" id="doMin" placeholder="例如：3" required>
                    <input type="number" id="doMax" placeholder="例如：5" required>
                </div>
            </div>
    
            <!-- 氧化還原電位範圍 -->
            <div class="form-group">
                <label for="orpMin">氧化還原電位範圍</label>
                <div class="input-pair">
                    <input type="number" id="orpMin" placeholder="例如：100" required>
                    <input type="number" id="orpMax" placeholder="例如：300" required>
                </div>
            </div>
    
            <!-- 氨氣範圍 -->
            <div class="form-group">
                <label for="saltMin">鹽度範圍</label>
                <div class="input-pair">
                    <input type="number" id="saltMin" placeholder="例如：0.5" required>

            </div>

    <script>
      const saveButton = document.getElementById('saveThresholds');
const modal = document.getElementById('modal');  // 取得模態框
const modalOverlay = document.getElementById('modalOverlay');  // 取得遮罩層
const modalMessage = document.getElementById('modalMessage');  // 取得顯示訊息區
const confirmButton = document.getElementById('confirmButton');  // 取得確認按鈕

// 初始時確保模態框和遮罩層隱藏
modal.style.display = "none";
modalOverlay.style.display = "none";

function toggleMenu() {
    const sideMenu = document.getElementById('sideMenu');
    if (sideMenu.style.left === '0px') {
        sideMenu.style.left = '-250px';
    } else {
        sideMenu.style.left = '0px';
    }
}

// 設置異常值按鈕點擊事件
saveButton.addEventListener('click', function() {
    const data = {
        tempMin: document.getElementById('tempMin').value,
        tempMax: document.getElementById('tempMax').value,
        pHMin: document.getElementById('pHMin').value,
        pHMax: document.getElementById('pHMax').value,
        doMin: document.getElementById('doMin').value,
        doMax: document.getElementById('doMax').value,
        orpMin: document.getElementById('orpMin').value,
        orpMax: document.getElementById('orpMax').value,
        saltMin: document.getElementById('saltMin').value,
        saltMax: document.getElementById('saltMax').value,
    };

    // 發送數據到後端
    fetch('/fish_farm/save-alert', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
    })
    .then(response => {
        if (response.ok) {
            modalMessage.textContent = "異常值已成功保存！";
            modal.style.display = "block";  // 顯示模態框
            modalOverlay.style.display = "block";  // 顯示遮罩層
        } else {
            modalMessage.textContent = "保存異常值時發生錯誤。請稍後再試。";
            modal.style.display = "block";  // 顯示模態框
            modalOverlay.style.display = "block";  // 顯示遮罩層
        }
    })
    .catch(error => {
        modalMessage.textContent = "儲存異常值失敗: " + error.message;
        modal.style.display = "block";  // 顯示模態框
        modalOverlay.style.display = "block";  // 顯示遮罩層
    });
});

// 確認按鈕點擊事件
confirmButton.addEventListener('click', function() {
    modal.style.display = "none";  // 隱藏模態框
    modalOverlay.style.display = "none";  // 隱藏遮罩層
});

// 回填異常值
document.addEventListener('DOMContentLoaded', function() {
    fetch('/fish_farm/get-alert-thresholds')
        .then(response => response.json())
        .then(data => {
            document.getElementById('tempMin').value = data.temp_Min;
            document.getElementById('tempMax').value = data.temp_Max;
            document.getElementById('pHMin').value = data.phMin;
            document.getElementById('pHMax').value = data.phMax;
            document.getElementById('doMin').value = data.doMin;
            document.getElementById('doMax').value = data.doMax;
            document.getElementById('orpMin').value = data.orpMin;
            document.getElementById('orpMax').value = data.orpMax;
            document.getElementById('saltMin').value= data.saltMin; 
            document.getElementById('saltMax').value= data.saltMax; 
            
            const formattedTime = new Date(data.time).toLocaleString('zh-TW', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('timeValue').textContent = formattedTime;
        })
});


    </script>
    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</html>
